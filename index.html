<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Savings Simulator</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Inter',sans-serif;
      min-height:100vh;
      color:#333;
    }

    body::before{
      content:"";
      position:fixed;
      width:100%; height:100%;
      background: linear-gradient(270deg,#e0f7fa,#80deea,#26c6da);
      background-size:1000% 1000%;
      z-index:-1;
      animation: gradientMove 30s infinite;
    }

    @keyframes gradientMove{
      0%{background-position:0%}
      50%{background-position:100%}
      100%{background-position:0%}
    }

    header{text-align:center;padding:60px;color:#fff;}
    h2{text-align:center;margin:30px 0;color:#004d40;}

    section{max-width:900px;margin:auto;padding:20px;}

    .box{
      background:rgba(255,255,255,0.25);
      backdrop-filter:blur(10px);
      border-radius:15px;
      padding:25px;
    }

    input,button{
      width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none;
    }

    button{
      background:#00acc1;color:#fff;cursor:pointer;
    }

    .results{display:none;margin-top:10px;text-align:center;}

    canvas{margin-top:20px;}

    .lang-btn{
      position:absolute;
      top:20px;
      right:20px;
      background:#fff;
      padding:8px 15px;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<button class="lang-btn" onclick="toggleLang()">EN</button>

<header>
  <h1 id="title">محاكي الادخار الذكي</h1>
  <p id="desc">ابدأ التخطيط لمستقبلك المالي</p>
</header>

<section>
  <h2 id="start">ابدأ المحاكاة</h2>
  <div class="box">

    <input type="number" id="monthly" placeholder="المبلغ الشهري">

    <input type="number" id="years" placeholder="عدد السنوات">

    <input type="number" id="rate" placeholder="نسبة الفائدة %">

    <button onclick="calc()" id="btn">احسب</button>

    <div class="results" id="result"></div>

    <canvas id="chart"></canvas>

  </div>
</section>

<script>
let chart;
let lang="ar";

function toggleLang(){
  lang = lang==="ar" ? "en" : "ar";

  document.getElementById("title").innerText =
    lang==="ar" ? "محاكي الادخار الذكي" : "Smart Savings Simulator";

  document.getElementById("desc").innerText =
    lang==="ar" ? "ابدأ التخطيط لمستقبلك المالي" : "Plan your financial future";

  document.getElementById("start").innerText =
    lang==="ar" ? "ابدأ المحاكاة" : "Start Simulation";

  document.getElementById("btn").innerText =
    lang==="ar" ? "احسب" : "Calculate";

  document.querySelector(".lang-btn").innerText =
    lang==="ar" ? "EN" : "AR";
}

function calc(){
  let m = parseFloat(document.getElementById("monthly").value);
  let y = parseInt(document.getElementById("years").value);
  let r = parseFloat(document.getElementById("rate").value)/100;

  if(isNaN(m)||isNaN(y)||isNaN(r)){
    alert(lang==="ar"?"ادخل القيم صح":"Enter valid values");
    return;
  }

  let months = y*12;
  let monthlyRate = r/12;

  let total=0;
  let data=[];
  let labels=[];

  for(let i=1;i<=months;i++){
    total=(total+m)*(1+monthlyRate);

    if(i%12===0){
      data.push(total.toFixed(0));
      labels.push((i/12)+(lang==="ar"?" سنة":" yr"));
    }
  }

  document.getElementById("result").style.display="block";
  document.getElementById("result").innerHTML =
    (lang==="ar"?"النتيجة: ":"Result: ") + total.toFixed(2);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label: lang==="ar"?"نمو الادخار":"Savings Growth",
        data:data
      }]
    }
  });
}
</script>

</body>
</html>
