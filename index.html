<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Savings Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  color:#fff;
}

/* 🔵 خلفية زرقاء متدرجة متحركة */
body::before{
  content:"";
  position:fixed;
  width:100%;height:100%;
  background: linear-gradient(270deg,#0f172a,#1e3a8a,#3b82f6,#1e3a8a,#0f172a);
  background-size:1000% 1000%;
  z-index:-1;
  animation: move 20s ease infinite;
}

@keyframes move{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

header{
  text-align:center;
  padding:60px;
}

/* 🌐 زر اللغة (دائري) */
.lang-btn{
  position:absolute;
  top:20px;
  right:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  font-size:20px;
  cursor:pointer;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  transition:0.3s;
}

.lang-btn:hover{
  transform:scale(1.1);
}

section{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h2{
  text-align:center;
  margin:20px 0;
  color:#bfdbfe;
}

.box{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:25px;
  border-radius:15px;
}

input,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

input{
  background:rgba(255,255,255,0.2);
  color:#fff;
}

button{
  background:#2563eb;
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

button:hover{
  background:#1d4ed8;
}

.results{
  display:none;
  text-align:center;
  margin-top:10px;
  font-size:18px;
}

.step{
  margin:10px 0;
  font-size:1.1rem;
}

canvas{
  margin-top:20px;
}

/* 📌 الفوتر */
footer{
  text-align:center;
  padding:30px;
  font-size:14px;
  color:#e0f2fe;
}
</style>
</head>

<body>

<button class="lang-btn" onclick="toggleLang()">🌐</button>

<header>
<h1 id="title">محاكي الادخار الذكي</h1>
<p id="desc">ابدأ التخطيط لمستقبلك المالي</p>
</header>

<section>
<h2 id="start">ابدأ المحاكاة</h2>

<div class="box">
<input type="number" id="monthly" placeholder="المبلغ الشهري">
<input type="number" id="years" placeholder="عدد السنوات">
<input type="number" id="rate" placeholder="نسبة الفائدة %">

<button onclick="calc()" id="btn">احسب</button>

<div class="results" id="result"></div>

<canvas id="chart"></canvas>
</div>
</section>

<section>
<h2 id="how">كيف يعمل المحاكي؟</h2>

<div class="box">
<div class="step">💰 <span id="s1">أدخل مبلغ الادخار الشهري</span></div>
<div class="step">📅 <span id="s2">حدد عدد السنوات</span></div>
<div class="step">📈 <span id="s3">أدخل نسبة الفائدة</span></div>
<div class="step">🎯 <span id="s4">احصل على النتائج والرسم البياني</span></div>
</div>
</section>

<footer>
© 2026 جميع الحقوق محفوظة
</footer>

<script>
let chart;
let lang="ar";

function toggleLang(){
  lang = lang==="ar" ? "en" : "ar";

  document.documentElement.lang = lang;
  document.body.dir = lang==="ar" ? "rtl" : "ltr";

  document.getElementById("title").innerText =
    lang==="ar" ? "محاكي الادخار الذكي" : "Smart Savings Simulator";

  document.getElementById("desc").innerText =
    lang==="ar" ? "ابدأ التخطيط لمستقبلك المالي" : "Plan your financial future";

  document.getElementById("start").innerText =
    lang==="ar" ? "ابدأ المحاكاة" : "Start Simulation";

  document.getElementById("how").innerText =
    lang==="ar" ? "كيف يعمل المحاكي؟" : "How does it work?";

  document.getElementById("btn").innerText =
    lang==="ar" ? "احسب" : "Calculate";

  document.getElementById("s1").innerText =
    lang==="ar" ? "أدخل مبلغ الادخار الشهري" : "Enter monthly savings";

  document.getElementById("s2").innerText =
    lang==="ar" ? "حدد عدد السنوات" : "Choose number of years";

  document.getElementById("s3").innerText =
    lang==="ar" ? "أدخل نسبة الفائدة" : "Enter interest rate";

  document.getElementById("s4").innerText =
    lang==="ar" ? "احصل على النتائج والرسم البياني" : "Get results and chart";
}

function calc(){
  let m = parseFloat(document.getElementById("monthly").value);
  let y = parseInt(document.getElementById("years").value);
  let r = parseFloat(document.getElementById("rate").value)/100;

  if(isNaN(m)||isNaN(y)||isNaN(r)){
    alert(lang==="ar"?"ادخل القيم صح":"Enter valid values");
    return;
  }

  let months = y*12;
  let monthlyRate = r/12;

  let total=0;
  let data=[];
  let labels=[];

  for(let i=1;i<=months;i++){
    total=(total+m)*(1+monthlyRate);

    if(i%12===0){
      data.push(total.toFixed(0));
      labels.push((i/12)+(lang==="ar"?" سنة":" yr"));
    }
  }

  document.getElementById("result").style.display="block";
  document.getElementById("result").innerHTML =
    (lang==="ar"?"النتيجة: ":"Result: ") + total.toFixed(2);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label: lang==="ar"?"نمو الادخار":"Savings Growth",
        data:data,
        borderWidth:2
      }]
    }
  });
}
</script>

</body>
</html>
